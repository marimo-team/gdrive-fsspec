name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/actions/setup

      # pyrefly-check uses language: system and expects pyrefly on PATH.
      - name: Run pre-commit
        run: PATH="$PWD/.venv/bin:$PATH" uvx pre-commit run --all-files

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/actions/setup
        with:
          python-version: "3.13"

      - name: Run pyrefly
        run: uv run pyrefly check --output-format=github

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        run: uv run pytest -v

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup
        with:
          python-version: "3.13"

      - name: Run tests with coverage
        run: |
          uv run pytest \
            --cov=gdrive_fsspec \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=95

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    # Run only when Drive credentials are available: manual dispatch, pushes to
    # master, or PRs from this repo (fork PRs are skipped — they cannot use secrets).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    timeout-minutes: 15
    environment:
      name: env1

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./.github/actions/setup
        with:
          python-version: "3.13"

      - name: Run integration tests
        env:
          GDRIVE_FSSPEC_DRIVE: gdrivefs-testing
          GDRIVE_FSSPEC_CREDENTIALS_PATH: ${{ secrets.GDRIVE_FSSPEC_CREDENTIALS_PATH }}
        run: uv run pytest -v -m integration
